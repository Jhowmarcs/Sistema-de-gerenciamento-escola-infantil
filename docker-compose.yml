version: '3.8'

services:
  app:
    build:
      context: ./app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://usuario:senha@db:5432/nome_banco
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: nome_banco
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Se houver scripts SQL para inicialização, você pode montar um volume apontando para BD/SQL

  monitor:
    build:
      context: ./observabilidade
    ports:
      - "3000:3000"  # Exemplo: porta padrão do Grafana ou outra ferramenta
    # Outras configurações conforme a ferramenta de monitoramento

volumes:
 - ./BD/SQL:/docker-entrypoint-initdb.d

  postgres_data:
