version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://usuario:senha@db:5432/nome_banco
    depends_on:
      - db
  
  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: nome_banco
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
